<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InterviewAI — Smart Interview Scheduling</title>
    <meta name="description" content="AI-powered WhatsApp interview scheduling platform by PickYourHire" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

    <style>
      /* Loading screen */
      #app-loader {
        position: fixed;
        inset: 0;
        background: #f9f8f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
        gap: 20px;
      }

      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .loader-icon {
        width: 48px;
        height: 48px;
        background: #1a1916;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        animation: pop 0.5s ease;
      }

      .loader-title {
        font-family: 'DM Serif Display', serif;
        font-size: 28px;
        color: #1a1916;
        font-weight: 400;
      }

      .loader-bar {
        width: 180px;
        height: 3px;
        background: #e8e6e1;
        border-radius: 10px;
        overflow: hidden;
      }

      .loader-bar-fill {
        height: 100%;
        width: 0%;
        background: #1a1916;
        border-radius: 10px;
        animation: load 1.2s ease forwards;
      }

      .loader-text {
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        color: #a8a49e;
        font-weight: 500;
      }

      @keyframes load {
        0% { width: 0%; }
        60% { width: 80%; }
        100% { width: 100%; }
      }

      @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #f9f8f6;
        font-family: 'DM Sans', sans-serif;
      }
    </style>
  </head>
  <body>

    <!-- Loading Screen -->
    <div id="app-loader">
      <div class="loader-logo">
        <div class="loader-icon">📅</div>
        <span class="loader-title">InterviewAI</span>
      </div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
      <span class="loader-text">Powered by PickYourHire · Pyren AI</span>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide loader when React app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 400);
          }
        }, 1400);
      });
    </script>
  </body>
</html>
